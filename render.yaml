services:
  # Django API — Web Service
  - type: web
    name: discord-clash-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false          # paste your Supabase URL here in Render dashboard
      - key: REDIS_URL
        sync: false          # paste your Upstash URL here
      - key: ALLOWED_HOSTS
        sync: false          # e.g. discord-clash-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false          # e.g. https://discord-clash.vercel.app
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: RIOT_API_KEY
        sync: false

  # Celery Worker
  - type: worker
    name: discord-clash-celery
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A core worker -l info --pool=solo
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: RIOT_API_KEY
        sync: false
